<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atmosfera</title>

  <link rel="stylesheet" href="css/style.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

</head>

<body>

    <div id="weatherEffects"></div>

  <div class="container">

    <div class="card">

      <img src="assets/weather-icon.png" alt="Weather Icon" class="logo" />

      <h1>Atmosfera</h1>

      <p class="subtitle">
        Consulta el clima en tiempo real
      </p>

      <div class="search-box">

        <input
          type="text"
          id="cityInput"
          placeholder="Ingresa una ciudad..."
        />

        <button id="searchBtn">
          Buscar
        </button>

      </div>

      <div id="loading" class="loading hidden">
        Cargando clima...
      </div>

      <div id="weatherResult" class="weather-result hidden">

        <h2 id="cityName"></h2>

        <div class="weather-info">

        <div class="info-box temperature">
            <span>🌡️ Temperatura</span>
            <h3 id="temperature"></h3>
        </div>

        <div class="info-box">
            <span>🥵 Sensación</span>
            <h3 id="feelsLike"></h3>
        </div>

        <div class="info-box">
            <span>💧 Humedad</span>
            <h3 id="humidity"></h3>
        </div>

        <div class="info-box wind">
            <span>💨 Viento</span>
            <h3 id="windSpeed"></h3>
        </div>

        <div class="info-box">
            <span>🧭 Dirección</span>
            <h3 id="windDirection"></h3>
        </div>

        <div class="info-box">
            <span>🌧️ Lluvia</span>
            <h3 id="rain"></h3>
        </div>

        <div class="info-box">
            <span>☀️ UV</span>
            <h3 id="uv"></h3>
        </div>

        <div class="info-box">
            <span>🌅 Amanecer</span>
            <h3 id="sunrise"></h3>
        </div>

        <div class="info-box">
            <span>🌇 Atardecer</span>
            <h3 id="sunset"></h3>
        </div>

        </div>

        <div class="weather-status">

            <img
                id="weatherIcon"
                class="weather-icon"
            />

            <h2 id="weatherDescription"></h2>

        </div>

        <h2 class="forecast-title">
        Pronóstico 5 días
        </h2>

        <div id="forecast" class="forecast-container"></div>

        <h2 class="forecast-title">
            Próximas horas
        </h2>

        <div
            id="hourlyForecast"
            class="forecast-container">
        </div>

        <h2 class="forecast-title">
        Radar meteorológico
        </h2>

        <div id="map"></div>

      </div>

      <div id="errorMessage" class="error hidden"></div>

    </div>

  </div>

  <script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script type="module" src="js/app.js"></script>

</body>
</html>
